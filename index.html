<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE-edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- website name : apna college -->
    <title>currency converter</title>
    <link rel="stylesheet" href="style.css" />
    <!-- <style></style> -->
    <!-- <script src="script.js"></script> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shippori+Antique&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- content tag -->
    <div class="container">
      <h1>currency converter</h1>
      <form>
        <div class="amount">
          <p>enter amount</p>
          <input placeholder="$1.00" type="text" />
        </div>
        <div class="drop-down">
          <p>select currency</p>
          <div class="from">
            <p>from</p>
            <div class="select">
              <img src="https://flagsapi.com/US/shiny/64.png" alt="image" />
              <select name="from">
                <option value="USD" selected>USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="AUD">AUD</option>
              </select>
            </div>
          </div>
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
          <div class="to">
            <p>to</p>
            <div class="select">
              <img src="https://flagsapi.com/IN/shiny/64.png" />
              <select name="to">
                <option value="INR" selected>INR</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="AUD">AUD</option>
              </select>
            </div>
          </div>
        </div>
        <div class="message">
          1.00 US Dollar = 83.513824 Indian Rupees 1 INR = 0.0119737 USD
        </div>
        <button>get exchange rate</button>
      </form>
    </div>
  </body>
  <script src="country-list.js"></script>
  <script src="script.js"></script>
</html>
